name: Deploy to AWS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Docker Login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build and Push
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/helpdesk-app:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/helpdesk-app:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/helpdesk-app:latest
            docker stop helpdesk-app || true
            docker rm helpdesk-app || true
            docker run -d -p 80:80 --name helpdesk-app ${{ secrets.DOCKER_USERNAME }}/helpdesk-app:latest
